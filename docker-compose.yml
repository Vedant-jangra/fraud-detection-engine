services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fraud_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fraud_kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fraud_timescaledb
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: fraud_engine_secret
      POSTGRES_DB: fraud_db
      POSTGRES_USER: postgres
    volumes:
      - tsdb_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fraud_prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.3.3
    container_name: fraud_grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  inference_stable:
    build:
      context: .
      dockerfile: docker/Dockerfile.inference
    container_name: fraud_inference_stable
    environment:
      JDBC_URL: postgresql://postgres:fraud_engine_secret@timescaledb:5432/fraud_db
      ONNX_MODEL_PATH: model/artifacts/model_quantized.onnx
    depends_on:
      - timescaledb
    expose:
      - "8000"

  inference_canary:
    build:
      context: .
      dockerfile: docker/Dockerfile.inference
    container_name: fraud_inference_canary
    environment:
      JDBC_URL: postgresql://postgres:fraud_engine_secret@timescaledb:5432/fraud_db
      ONNX_MODEL_PATH: model/artifacts/model_quantized.onnx
    depends_on:
      - timescaledb
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: fraud_api_gateway
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:8000"
    depends_on:
      - inference_stable
      - inference_canary

volumes:
  tsdb_data:
  grafana_data: