name: CD — Build, Scan & Push

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate model artifacts
        run: |
          PYTHONPATH=. python model/train.py
          PYTHONPATH=. python model/export_onnx.py

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.inference \
            -t fraud-engine:${{ github.sha }} .

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fraud-engine:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag fraud-engine:${{ github.sha }} \
            ghcr.io/${{ github.repository }}/fraud-engine:latest
          docker push ghcr.io/${{ github.repository }}/fraud-engine:latest
