name: Automated Model Retraining

on:
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: 'Why retraining was triggered'
        required: true
        default: 'data_drift_detected'

  schedule:
    - cron: '0 2 * * 0'  # 02:00 UTC every Sunday

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export training data (rolling 90-day window)
        env:
          DB_URL: ${{ secrets.TIMESCALEDB_URL }}
        run: PYTHONPATH=. python processing/export_training_data.py --window-days=90

      - name: Train new model
        run: PYTHONPATH=. python model/train.py --output=model/artifacts/candidate.pkl

      - name: Evaluate against holdout
        run: |
          PYTHONPATH=. python model/evaluate.py \
            --model=model/artifacts/candidate.pkl \
            --baseline=model/artifacts/production.pkl \
            --output=reports/retrain_comparison.json

      - name: Check if new model is better
        id: check_improvement
        run: |
          python -c "
          import json
          r = json.load(open('reports/retrain_comparison.json'))
          ok = r['candidate_auprc'] >= r['baseline_auprc'] - 0.01
          print(f'Candidate AUPRC: {r[\"candidate_auprc\"]:.4f}')
          print(f'Baseline  AUPRC: {r[\"baseline_auprc\"]:.4f}')
          exit(0 if ok else 1)
          "

      - name: Export to ONNX + quantize
        if: steps.check_improvement.outcome == 'success'
        run: PYTHONPATH=. python model/export_onnx.py --input=model/artifacts/candidate.pkl

      - name: Build and push new inference image
        if: steps.check_improvement.outcome == 'success'
        run: |
          docker build -f docker/Dockerfile.inference \
            -t fraud-engine:retrain-${{ github.run_id }} .

      - name: Upload retraining report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-report
          path: reports/retrain_comparison.json
